<!DOCTYPE html>
<html>

<head>
    <title>Smart PiP Assistant Configuration</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            width: 340px;
            background: #141414;
            color: #fff;
            margin: 0;
        }

        .container {
            padding: 15px;
        }

        h3 {
            margin-top: 0;
            color: #E50914;
            font-size: 16px;
            margin-bottom: 6px;
        }

        p {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 14px;
            line-height: 1.4;
        }

        input {
            width: 93%;
            padding: 10px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            border-radius: 4px;
            margin-bottom: 14px;
            font-size: 13px;
            outline: none;
        }

        input:focus {
            border-color: #E50914;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #E50914;
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        button:hover {
            background: #FF1E27;
        }

        #status {
            margin-top: 12px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            min-height: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3>☁️ Cloud Endpoint Configuration</h3>
        <p>Input your deployed backend production URL from Render to link your global pipeline mesh:</p>

        <input type="text" id="serverUrl" placeholder="https://smart-pip-assistant.onrender.com">
        <button id="saveBtn">Save Endpoint Connection</button>
        <div id="status"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
